<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoardVerse - Cafe SePay Config</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .bank-list {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cafe SePay Configuration</h1>
        <p class="subtitle">Cập nhật thông tin thanh toán SePay cho quán</p>
        
        <form id="cafeForm">
            <div class="form-group">
                <label for="cafeId">Cafe ID:</label>
                <input type="text" id="cafeId" required placeholder="Nhập Cafe GUID (VD: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)">
            </div>
            
            <div class="form-group">
                <label for="sePayBankCode">Mã Ngân Hàng (Bank Code):</label>
                <select id="sePayBankCode">
                    <option value="">-- Chọn ngân hàng --</option>
                    <option value="MBBank">MBBank</option>
                    <option value="Vietinbank">Vietinbank</option>
                    <option value="VPBank">VPBank</option>
                    <option value="TPBank">TPBank</option>
                    <option value="ACB">ACB</option>
                    <option value="Techcombank">Techcombank</option>
                    <option value="Vietcombank">Vietcombank</option>
                    <option value="BIDV">BIDV</option>
                    <option value="Sacombank">Sacombank</option>
                    <option value="Eximbank">Eximbank</option>
                </select>
                <div class="hint">Để trống nếu không muốn thay đổi</div>
            </div>
            
            <div class="form-group">
                <label for="sePayAccountNumber">Số Tài Khoản (Account Number):</label>
                <input type="text" id="sePayAccountNumber" placeholder="Nhập số tài khoản">
                <div class="hint">Để trống nếu không muốn thay đổi</div>
            </div>
            
            <div class="form-group">
                <label for="token">JWT Token:</label>
                <input type="password" id="token" required placeholder="Nhập JWT token của Manager">
                <div class="hint">Token có thể lấy từ Developer Tools > Application > LocalStorage</div>
            </div>
            
            <button type="submit" id="submitBtn">Cập nhật</button>
        </form>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        document.getElementById('cafeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            const submitBtn = document.getElementById('submitBtn');
            
            const cafeId = document.getElementById('cafeId').value.trim();
            const sePayBankCode = document.getElementById('sePayBankCode').value || null;
            const sePayAccountNumber = document.getElementById('sePayAccountNumber').value.trim() || null;
            const token = document.getElementById('token').value.trim();
            
            if (!cafeId) {
                showResult('error', 'Vui lòng nhập Cafe ID');
                return;
            }
            
            if (!sePayBankCode && !sePayAccountNumber) {
                showResult('error', 'Vui lòng nhập ít nhất một trường để cập nhật');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang cập nhật...';
            resultDiv.style.display = 'none';
            
            try {
                const requestBody = {};
                if (sePayBankCode) requestBody.sePayBankCode = sePayBankCode;
                if (sePayAccountNumber) requestBody.sePayAccountNumber = sePayAccountNumber;
                
                const response = await fetch(`/api/cafes/${cafeId}/sepay-config`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('success', 'Cập nhật thành công!');
                } else {
                    const errorMsg = data.errors?.[0] || data.message || 'Có lỗi xảy ra';
                    showResult('error', `Lỗi: ${errorMsg}`);
                }
            } catch (err) {
                showResult('error', `Lỗi kết nối: ${err.message}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Cập nhật';
            }
        });
        
        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
